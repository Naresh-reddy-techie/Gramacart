{% extends 'admin_dashboard/base.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card border-0 shadow-sm rounded-4 p-4 text-center">

                <i class="bi bi-exclamation-triangle text-danger display-5 mb-3"></i>

                <h4 class="fw-800">Delete Product?</h4>

                <p class="text-muted">
                    Are you sure you want to delete <b>{{ product.name }}</b>?  
                    This action cannot be undone.
                </p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="d-flex gap-3 justify-content-center mt-4">

                        <a href="{% url 'product_list' %}" class="btn btn-light border px-4">
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-danger px-4 fw-800">
                            Delete
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
