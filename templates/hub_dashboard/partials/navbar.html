<div class="w-100 d-flex align-items-center justify-content-between">

    <!-- LEFT SIDE -->
    <div class="d-flex align-items-center gap-3">

        <!-- Sidebar Toggle -->
        <button
            type="button"
            class="nav-icon-btn"
            onclick="toggleSidebar()"
            aria-label="Toggle Sidebar">

            <i class="bi bi-list"></i>

        </button>

        <!-- Mobile Brand -->
        <div class="d-lg-none">

            <span class="fw-bold fs-5 text-dark">
                Grama<span class="text-success">Cart</span>
            </span>

        </div>

        <!-- Desktop Greeting -->
        <div class="d-none d-md-block">

            <h6 class="mb-0 fw-bold">
                Hello, {{ request.user.username|capfirst }} 👋
            </h6>

            <small class="text-muted">

                <span class="text-success fw-semibold">
                    ●
                </span>

                Hub Online

            </small>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="d-flex align-items-center gap-2 gap-lg-3">

        <!-- Last Login -->
        <div
            class="d-none d-xl-flex align-items-center gap-2 px-3 py-2 rounded-pill border bg-white">

            <i class="bi bi-clock-history text-primary"></i>

            <small class="fw-semibold text-muted">

                {{ request.user.last_login|date:"d M Y H:i" }}

            </small>

        </div>

        <!-- Notifications -->
        <div class="dropdown">

            <button
                class="nav-icon-btn position-relative"
                data-bs-toggle="dropdown">

                <i class="bi bi-bell"></i>

                {% if alerts %}
                <span
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

                    {{ alerts|length }}

                </span>
                {% endif %}

            </button>

            <div
                class="dropdown-menu dropdown-menu-end shadow border-0 p-0 overflow-hidden"
                style="width:340px;">

                <div class="px-3 py-3 border-bottom fw-bold">
                    Notifications
                </div>

                <div style="max-height:350px;overflow-y:auto;">

                    {% for alert in alerts %}

                    <a
                        href="{{ alert.link|default:'#' }}"
                        class="dropdown-item py-3">

                        <div class="fw-semibold">
                            {{ alert.title }}
                        </div>

                        <small class="text-muted">
                            {{ alert.subtitle }}
                        </small>

                    </a>

                    {% empty %}

                    <div class="text-center py-4 text-muted">
                        No notifications
                    </div>

                    {% endfor %}

                </div>

            </div>

        </div>

        <!-- Profile -->
        <div class="dropdown">

            <button
                class="btn p-1 border rounded-pill d-flex align-items-center gap-2 bg-white shadow-sm"
                data-bs-toggle="dropdown">

                <div
                    class="rounded-circle bg-dark text-white d-flex align-items-center justify-content-center fw-bold"
                    style="width:38px;height:38px;">

                    {{ request.user.username|first|upper }}

                </div>

                <div class="d-none d-lg-block text-start">

                    <div
                        class="fw-semibold small text-dark">

                        {{ request.user.username }}

                    </div>

                    <div
                        class="text-muted"
                        style="font-size:11px;">

                        {{ request.user.get_role_display|default:"Administrator" }}

                    </div>

                </div>

                <i class="bi bi-chevron-down small text-muted"></i>

            </button>

            <ul
                class="dropdown-menu dropdown-menu-end shadow border-0">

                <li>
                    <a class="dropdown-item" href="#">
                        <i class="bi bi-person me-2"></i>
                        Profile
                    </a>
                </li>

                <li>
                    <a class="dropdown-item" href="#">
                        <i class="bi bi-gear me-2"></i>
                        Settings
                    </a>
                </li>

                <li>
                    <hr class="dropdown-divider">
                </li>

                <li>
                <form method="post" action="{% url 'user_logout' %}">
                    {% csrf_token %}

                    <button
                        type="submit"
                        class="dropdown-item text-danger border-0 bg-transparent w-100 text-start">

                        <i class="bi bi-box-arrow-right me-2"></i>

                        Logout

                    </button>
                </form>
                </li>

            </ul>

        </div>

    </div>

</div>
