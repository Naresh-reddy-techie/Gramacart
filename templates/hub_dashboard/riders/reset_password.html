{% extends "hub_dashboard/base.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<div class="container" style="max-width:500px;">

    <div class="card shadow-sm">

        <div class="card-body">

            <h4>
                Reset Password
            </h4>

            <p>
                Rider:
                <strong>
                    {{ rider.user.get_full_name }}
                </strong>
            </p>

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        New Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required
                    >

                </div>

                <button
                    class="btn btn-success"
                    type="submit"
                >
                    Save Password
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
