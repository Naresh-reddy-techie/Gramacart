<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm Delete - Nature's Food</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fff7f7;
    }
    .delete-box {
      max-width: 500px;
      margin: 5rem auto;
      padding: 2rem;
      background-color: #ffffff;
      border: 2px solid #f8d7da;
      border-radius: 10px;
    }
    .btn-delete {
      background-color: #dc3545;
      color: white;
    }
    .btn-cancel {
      background-color: #6c757d;
      color: white;
    }
  </style>
</head>
<body>

  <div class="delete-box text-center shadow-sm">
    <h3 class="text-danger mb-3">Confirm Delete</h3>
    <p>Are you sure you want to delete the product:</p>
    <h5 class="fw-bold text-dark">{{ product.name }}</h5>

    {% if product.images.all %}
      <img src="{{ product.images.all.0.image.url }}" alt="{{ product.name }}" class="img-thumbnail my-3" width="120">
    {% endif %}

    <form method="post" class="d-flex justify-content-center gap-3 mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-delete">Yes, Delete</button>
      <a href="{% url 'list_product' %}" class="btn btn-cancel">Cancel</a>
    </form>
  </div>

</body>
</html>
