{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- MOBILE FIRST -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <title>{% block title %}GramaCart{% endblock %}</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #10B981;
            --navy: #0F172A;
            --bg: #F1F5F9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--navy);
            margin: 0;
            padding-bottom: 90px; /* space for bottom nav */
        }

        /* HEADER */
        .top-brand-bar {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-area img {
            height: 26px;
        }

        .logo-area h1 {
            font-size: 1.2rem;
            margin: 0;
            font-weight: 800;
        }

        .logo-area span {
            color: var(--primary);
        }

        .location-pill {
            background: #f1f5f9;
            padding: 6px 10px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* SEARCH */
        .search-section {
            background: #fff;
            padding: 10px 15px;
        }

        /* CATEGORY */
        .cat-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 15px;
            background: #fff;
        }

        .cat-scroll::-webkit-scrollbar {
            display: none;
        }

        /* MAIN */
        .main-content {
            padding: 10px 12px;
        }

        /* BOTTOM NAV */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 18px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.08);
            z-index: 2000;
        }

        .nav-item {
            text-align: center;
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.65rem;
            font-weight: 700;
            position: relative;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            display: block;
            font-size: 1.3rem;
        }

        .badge-count {
            position: absolute;
            top: -4px;
            right: -6px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LANGUAGE */
        .translate-box {
            position: relative;
            width: 36px;
            height: 36px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .translate-box select {
            position: absolute;
            inset: 0;
            opacity: 0;
        }

        /* REMOVE GOOGLE UI */
        .goog-te-banner-frame,
        .goog-logo-link {
            display: none !important;
        }

        body {
            top: 0 !important;
        }

        @media (min-width: 768px) {
            .main-content {
                max-width: 720px;
                margin: auto;
            }
        }

    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- HEADER -->
<div class="top-brand-bar">
    <div class="logo-area">
        <img src="{% static 'images/logo.png' %}">
        <h1>Grama<span>Cart</span></h1>
    </div>

    <div class="d-flex align-items-center gap-2">

        <!-- LANGUAGE -->
        <div class="translate-box">
            <i class="bi bi-translate text-success"></i>
            <select id="langSwitcher">
                <option value="">🌐</option>
                <option value="en">English</option>
                <option value="te">తెలుగు</option>
                <option value="hi">हिंदी</option>
                <option value="ta">தமிழ்</option>
            </select>
        </div>

        <div class="location-pill">
            <i class="bi bi-geo-alt-fill text-success"></i> Kaza
        </div>

    </div>
</div>

<!-- SEARCH -->
{% block search %}{% endblock %}

<!-- CATEGORY -->
{% block categories %}{% endblock %}

<!-- MAIN CONTENT -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

<!-- BOTTOM NAV -->
{% include "shop/bottom_nav.html" %}

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* LANGUAGE PERSIST */
(function(){
    const lang = localStorage.getItem("lang");
    if(lang){
        document.cookie = "googtrans=/en/" + lang + ";path=/";
    }
})();

document.getElementById("langSwitcher")?.addEventListener("change", function(){
    const lang = this.value;
    localStorage.setItem("lang", lang);
    document.cookie = "googtrans=/en/" + lang + ";path=/";
    location.reload();
});
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
