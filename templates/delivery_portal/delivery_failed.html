{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fail Delivery | GramaCart Rider</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --danger: #ef4444; --navy: #0f172a; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        
        .fail-container { max-width: 500px; margin: auto; }
        .order-strip { background: #fff; border-radius: 20px; padding: 15px; border-left: 5px solid var(--danger); margin-bottom: 25px; }
        
        /* Reason Chips */
        .reason-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .reason-chip { display: none; }
        .reason-label { 
            background: #fff; border: 2px solid #e2e8f0; border-radius: 16px; padding: 15px 10px;
            text-align: center; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .reason-chip:checked + .reason-label { border-color: var(--danger); background: #fef2f2; color: var(--danger); }
        .reason-label i { font-size: 1.2rem; }

        /* Other Reason Box */
        #other-reason-container { display: none; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-confirm { 
            background: var(--navy); color: white; border: none; width: 100%; 
            padding: 18px; border-radius: 20px; font-weight: 800; margin-top: 20px; 
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-confirm:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="fail-container">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="javascript:history.back()" class="text-dark"><i class="bi bi-chevron-left fs-4"></i></a>
        <h4 class="fw-800 mb-0">Cancel Delivery</h4>
    </div>

    <div class="order-strip shadow-sm">
        <span class="text-muted smaller fw-bold">ORDER ID</span>
        <div class="fw-800">#{{ order.order_number }}</div>
        <div class="smaller text-muted"><i class="bi bi-geo-alt"></i> {{ order.address.village }}</div>
    </div>

    <form method="POST" id="failForm">
        {% csrf_token %}
        <p class="fw-800 small text-muted mb-3">SELECT A REASON</p>
        
        <div class="reason-grid">
            <input type="radio" name="reason" value="Customer Not Available" id="r1" class="reason-chip" onclick="toggleOther(false)">
            <label for="r1" class="reason-label"><i class="bi bi-person-x"></i> Not at Home</label>

            <input type="radio" name="reason" value="Phone Not Reachable" id="r2" class="reason-chip" onclick="toggleOther(false)">
            <label for="r2" class="reason-label"><i class="bi bi-reception-0"></i> No Signal</label>

            <input type="radio" name="reason" value="Address Not Found" id="r3" class="reason-chip" onclick="toggleOther(false)">
            <label for="r3" class="reason-label"><i class="bi bi-map"></i> Wrong Address</label>

            <input type="radio" name="reason" value="Customer Refused" id="r4" class="reason-chip" onclick="toggleOther(false)">
            <label for="r4" class="reason-label"><i class="bi bi-hand-thumbs-down"></i> Refused</label>

            <input type="radio" name="reason" value="Vehicle Issue" id="r5" class="reason-chip" onclick="toggleOther(false)">
            <label for="r5" class="reason-label"><i class="bi bi-bicycle"></i> Bike Issue</label>

            <input type="radio" name="reason" value="Other" id="r-other" class="reason-chip" onclick="toggleOther(true)">
            <label for="r-other" class="reason-label"><i class="bi bi-three-dots"></i> Other</label>
        </div>

        <div id="other-reason-container">
            <p class="fw-800 small text-muted mb-2">PLEASE SPECIFY REASON</p>
            <textarea name="other_text" id="other_text" class="form-control rounded-4 p-3" rows="3" placeholder="Tell us what happened..."></textarea>
        </div>

        <button type="submit" id="submitBtn" class="btn-confirm shadow-lg" disabled>
            <span>Confirm Cancellation</span>
            <i class="bi bi-arrow-right-short fs-4"></i>
        </button>
    </form>
</div>

<script>
    const form = document.getElementById('failForm');
    const submitBtn = document.getElementById('submitBtn');
    const otherText = document.getElementById('other_text');
    const otherContainer = document.getElementById('other-reason-container');

    function toggleOther(show) {
        otherContainer.style.display = show ? 'block' : 'none';
        validate();
    }

    form.addEventListener('change', validate);
    otherText.addEventListener('input', validate);

    function validate() {
        const selected = document.querySelector('input[name="reason"]:checked');
        if (!selected) {
            submitBtn.disabled = true;
            return;
        }

        if (selected.value === "Other") {
            // Enable button only if text is entered
            submitBtn.disabled = otherText.value.trim().length < 5;
        } else {
            submitBtn.disabled = false;
        }
    }
</script>

</body>
</html>
