{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}GramaCart Partner{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-primary: #10b981;
            --brand-deep: #008F47;
            --ui-bg: #F8F9FA;
            --ui-card: #FFFFFF;
            --ui-text: #1a1a1a;
            --ui-subtext: #6c757d;
            --ui-border: #EEEEEE;
            --header-height: 64px;
            --dock-height: 75px;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body.dark-mode {
            --ui-bg: #0F172A;
            --ui-card: #1E293B;
            --ui-text: #F8FAF8;
            --ui-subtext: #94A3B8;
            --ui-border: #334155;
        }

        body {
            background-color: var(--ui-bg);
            color: var(--ui-text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overscroll-behavior-y: contain;
            transition: background 0.3s ease;
        }

        /* HEADER & BRANDING */
        .app-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: calc(var(--header-height) + var(--safe-top));
            padding-top: var(--safe-top);
            background: var(--ui-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-inline: 20px;
            border-bottom: 1px solid var(--ui-border);
            z-index: 1040; /* Lower than modal z-index */
        }

        .logo-box { display: flex; align-items: center; font-size: 1.1rem; font-weight: 800; }
        .logo-icon {
            background: var(--brand-primary); color: white;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; margin-right: 8px; font-size: 14px;
        }

        .duty-pill {
            display: flex; align-items: center; gap: 8px;
            background: var(--ui-bg);
            padding: 8px 16px;
            border-radius: 100px;
            border: 2px solid var(--ui-border);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .duty-pill.is-online {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--brand-primary);
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #cbd5e1;
            transition: 0.3s;
        }
        .is-online .status-dot {
            background: var(--brand-primary);
            box-shadow: 0 0 10px var(--brand-primary);
            animation: pulse 2s infinite;
        }

        /* NAVIGATION DOCK */
        .app-dock {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(var(--dock-height) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--ui-card);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-top: 1px solid var(--ui-border);
            z-index: 1040;
        }
        .dock-link {
            text-decoration: none; color: var(--ui-subtext);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800;
            text-transform: uppercase;
        }
        .dock-link.active { color: var(--brand-primary); }
        .dock-link i { font-size: 1.5rem; margin-bottom: 2px; }

        .app-shell {
            margin-top: calc(var(--header-height) + var(--safe-top));
            margin-bottom: calc(var(--dock-height) + var(--safe-bottom));
            padding: 16px;
            min-height: 100vh;
        }

        /* MODAL FIX: Ensure modal is on top of header/dock */
        .modal { z-index: 1060 !important; }
        .modal-backdrop { z-index: 1050 !important; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="{% if request.COOKIES.theme == 'dark' %}dark-mode{% endif %}">

    <header class="app-header">
        <div class="logo-box">
            <div class="logo-icon">G</div>
            <span style="color:var(--ui-text)">Grama<span style="color:var(--brand-primary)">Cart</span></span>
        </div>

        <div id="duty-pill" 
             class="duty-pill {% if request.user.delivery_profile.is_online %}is-online{% endif %}" 
             onclick="toggleDuty()">
            <div class="status-dot"></div>
            <span id="duty-label" style="font-size: 11px; font-weight: 800;">
                {% if request.user.delivery_profile.is_online %}ONLINE{% else %}OFFLINE{% endif %}
            </span>
        </div>

        <button onclick="toggleTheme()" class="btn btn-link text-decoration-none p-0">
            <i class="bi {% if request.COOKIES.theme == 'dark' %}bi-moon-stars-fill{% else %}bi-brightness-high-fill{% endif %} fs-5" 
               id="theme-icon" style="color: var(--ui-subtext)"></i>
        </button>
    </header>

    <main class="app-shell">
        {% block content %}{% endblock %}
    </main>

    <nav class="app-dock">
        <a href="{% url 'rider_dashboard' %}" class="dock-link {% if 'dashboard' in request.path %}active{% endif %}">
            <i class="bi bi-broadcast"></i><span>Radar</span>
        </a>
        <a href="{% url 'active_deliveries' %}" class="dock-link {% if 'active' in request.path %}active{% endif %}">
            <i class="bi bi-bicycle"></i><span>Tasks</span>
        </a>
        <a href="{% url 'rider_earnings' %}" class="dock-link {% if 'earnings' in request.path %}active{% endif %}">
            <i class="bi bi-wallet2"></i><span>Wallet</span>
        </a>
        <a href="{% url 'rider_profile' %}" class="dock-link {% if 'profile' in request.path %}active{% endif %}">
            <i class="bi bi-person-circle"></i><span>Profile</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const haptic = (n = 40) => { if("vibrate" in navigator) navigator.vibrate(n); };

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.getElementById('theme-icon').className = isDark ? 'bi bi-moon-stars-fill fs-5' : 'bi bi-brightness-high-fill fs-5';
            document.cookie = `theme=${isDark ? 'dark' : 'light'};path=/;max-age=31536000`;
            haptic(20);
        }

        async function toggleDuty() {
            const pill = document.getElementById('duty-pill');
            const label = document.getElementById('duty-label');
            const currentState = pill.classList.contains('is-online');
            
            haptic(60);

            try {
                const response = await fetch("{% url 'toggle_duty' %}", {
                    method: 'POST',
                    headers: { 
                        'X-CSRFToken': '{{ csrf_token }}', 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ is_online: !currentState })
                });
                const data = await response.json();

                if(data.status === 'success') {
                    const online = data.is_online;
                    pill.classList.toggle('is-online', online);
                    label.innerText = online ? "ONLINE" : "OFFLINE";
                    window.dispatchEvent(new CustomEvent('dutyStatusChanged', { detail: { online } }));
                    haptic([30, 50, 30]);
                }
            } catch (err) {
                console.error("Duty toggle failed", err);
            }
        }
    </script>
    {% block page_scripts %}{% endblock %}
</body>
</html>
