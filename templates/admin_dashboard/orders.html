{% extends 'admin_dashboard/base.html' %}
{% load static %}

{% block content %}
<div class="admin-wrapper" style="background: #f4f7f6; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif;">
    
    <div class="container-fluid px-3 pt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-900 text-dark mb-0">GramaCart Hub</h2>
                <div class="d-flex align-items-center gap-2">
                    <span class="pulse-icon"></span>
                    <span class="text-muted smaller fw-bold">REAL-TIME MONITOR</span>
                </div>
            </div>
            <div class="text-end">
                <div class="badge bg-white text-dark shadow-sm border rounded-pill px-3 py-2 fw-bold">
                    <i class="bi bi-cash-stack text-success me-1"></i> Today: <span id="stat-total-rev">₹0</span>
                </div>
            </div>
        </div>

        <div class="bg-white p-2 rounded-4 shadow-sm mb-4 border d-flex flex-column gap-2">
            <div class="filter-pills d-flex gap-2 overflow-auto no-scrollbar py-1">
                <button class="pill active" data-status="live">Live Feed</button>
                <button class="pill" data-status="packed">Packed</button>
                <button class="pill" data-status="tracking">In Transit</button>
                <button class="pill" data-status="history">History</button>
            </div>
            <div class="input-group border-top border-light pt-2 mt-1">
                <span class="input-group-text bg-transparent border-0"><i class="bi bi-search"></i></span>
                <input type="text" id="orderSearch" class="form-control border-0 shadow-none ps-0" placeholder="Search orders..." onkeyup="debounceSearch()">
            </div>
        </div>

        <div class="row g-3" id="ordersContainer"></div>
        
        <div id="loadingSpinner" class="text-center py-5 d-none">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-end border-0 shadow-lg" tabindex="-1" id="orderDrawer" style="width: 100%; max-width: 500px; border-radius: 30px 0 0 30px;">
    <div class="offcanvas-header border-bottom p-4">
        <div>
            <h5 class="offcanvas-title fw-900 h4 mb-0" id="drawerOrderID">#ORDER-000</h5>
            <span class="badge bg-primary-subtle text-primary rounded-pill fw-bold mt-2" id="drawerStatus">PENDING</span>
        </div>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-4" id="drawerContent">
        </div>
    <div class="offcanvas-footer p-4 border-top bg-light" id="drawerFooter">
        </div>
</div>

<div class="modal fade" id="riderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered mx-3">
        <div class="modal-content rounded-5 border-0">
            <div class="modal-body p-4 text-center">
                <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex p-3 mb-3">
                    <i class="bi bi-bicycle h3 mb-0"></i>
                </div>
                <h5 class="fw-800 mb-4">Assign Delivery Partner</h5>
                <select id="riderSelect" class="form-select rounded-4 p-3 mb-4 border-light">
                    <option value="">Choose Rider...</option>
                    {% for boy in delivery_boys %}
                        <option value="{{ boy.id }}">{{ boy.user.get_full_name }} ({{ boy.hub }})</option>
                    {% endfor %}
                </select>
                <div class="d-grid gap-2">
                    <button class="btn btn-dark py-3 rounded-4 fw-bold" onclick="executeAssignRider()">Dispatch Order</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .fw-900 { font-weight: 900; } .fw-800 { font-weight: 800; }
    .smaller { font-size: 11px; } .no-scrollbar::-webkit-scrollbar { display: none; }
    .pulse-icon { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    
    .pill { border: none; background: #fff; color: #64748b; padding: 10px 20px; border-radius: 14px; font-weight: 700; border: 1px solid #eee; transition: 0.2s; }
    .pill.active { background: #000; color: #fff; border-color: #000; }

    .summary-card { background: white; border-radius: 25px; border: 1px solid #eee; transition: 0.3s; }
    .summary-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    
    .item-row { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #f8f9fa; }
    .item-img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #f8f9fa; }
</style>

<script>
let currentStatus = 'live';
let ordersCache = [];
let activeOrderNum = null; //

function fetchOrders(page = 1) {
    document.getElementById('loadingSpinner').classList.remove('d-none');
    fetch(`{% url 'admin_orders_json' %}?page=${page}&status=${currentStatus}&search=${document.getElementById('orderSearch').value}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loadingSpinner').classList.add('d-none');
            document.getElementById('stat-total-rev').innerText = `₹${data.today_revenue}`;
            ordersCache = data.orders;
            renderSummaryGrid(data.orders);
        });
}

function renderSummaryGrid(orders) {
    const container = document.getElementById('ordersContainer');
    if (!orders.length) {
        container.innerHTML = `<div class="col-12 text-center py-5 text-muted">No orders in this queue</div>`;
        return;
    }

    container.innerHTML = orders.map(o => `
        <div class="col-12 col-md-6 col-lg-4">
            <div class="summary-card p-4 shadow-sm">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <span class="text-primary smaller fw-800 text-uppercase"><i class="bi bi-geo-alt"></i> ${o.village_cluster}</span>
                        <h5 class="fw-800 mb-0 mt-1">${o.customer}</h5>
                    </div>
                    <div class="badge bg-light text-dark border">#${o.order_number}</div>
                </div>
                <div class="text-muted smaller fw-bold mb-3">${o.items.length} Items • Total: ₹${o.total}</div>
                <button class="btn btn-outline-dark w-100 rounded-pill fw-bold py-2" onclick="showOrderDetails('${o.order_number}')">
                    Manage Order <i class="bi bi-arrow-right ms-1"></i>
                </button>
            </div>
        </div>
    `).join('');
}

function showOrderDetails(orderNum) {
    const order = ordersCache.find(o => o.order_number === orderNum);
    if(!order) return;

    document.getElementById('drawerOrderID').innerText = `#${order.order_number}`;
    document.getElementById('drawerStatus').innerText = order.status.toUpperCase();
    
    let content = `
        <div class="customer-info mb-4">
            <p class="text-muted smaller fw-bold mb-2">CUSTOMER DETAILS</p>
            <h6 class="fw-bold mb-1">${order.customer}</h6>
            <p class="small mb-2"><i class="bi bi-telephone"></i> ${order.address.phone}</p>
            <div class="bg-light p-3 rounded-4 border">
                <p class="small mb-1 fw-bold">${order.address.address_line}</p>
                <p class="smaller text-muted mb-0">Landmark: ${order.address.landmark}</p>
            </div>
        </div>
        
        <div class="packing-list">
            <p class="text-muted smaller fw-bold mb-2">PACKING LIST</p>
            ${order.items.map(i => `
                <div class="item-row">
                    <img src="${i.image_url || '/static/img/no-prod.png'}" class="item-img border">
                    <div class="flex-grow-1">
                        <span class="fw-bold d-block mb-0" style="font-size:14px;">${i.product_name}</span>
                        <span class="text-muted smaller fw-bold">${i.product_size}</span>
                    </div>
                    <div class="text-end">
                        <span class="badge bg-dark rounded-pill">x${i.quantity}</span>
                    </div>
                </div>
            `).join('')}
        </div>
        
        <div class="mt-4 d-flex justify-content-between align-items-center bg-dark text-white p-3 rounded-4">
            <span class="fw-bold">Total Bill</span>
            <span class="h4 fw-900 mb-0">₹${order.total}</span>
        </div>
    `;

    document.getElementById('drawerContent').innerHTML = content;
    
    // Inject Buttons based on state
    let footer = '';
    if (order.status_code === 'pending' || order.status_code === 'confirmed') {
        footer = `
            <div class="d-grid gap-2 w-100">
                <button class="btn btn-warning py-3 rounded-4 fw-bold text-white shadow-sm" onclick="markAsPacked('${order.order_number}')">Confirm & Pack Order</button>
                <button class="btn btn-link text-danger smaller fw-bold text-decoration-none" onclick="rejectOrder('${order.order_number}')">Reject Order</button>
            </div>
        `;
    } else if (order.status_code === 'packed') {
        footer = `<button class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow-sm" onclick="openRiderModal('${order.order_number}')">Assign Delivery Partner</button>`;
    } else {
        footer = `<button class="btn btn-outline-dark w-100 py-3 rounded-4 fw-bold" onclick="window.open('/admin/print/${order.order_number}/')">Print Invoice</button>`;
    }

    document.getElementById('drawerFooter').innerHTML = footer;
    new bootstrap.Offcanvas(document.getElementById('orderDrawer')).show();
}

function markAsPacked(num) {
    if(!confirm("Verify all items are in the bag. Proceed?")) return;
    
    // This URL must match the path in urls.py exactly
    fetch(`/admin_dashboard/orders/pack/${num}/`, { 
        method: 'POST', 
        headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'Content-Type': 'application/json'
        } 
    })
    .then(res => res.json())
    .then(data => {
        if(data.success) {
            // Close the side drawer if it's open
            const drawerElement = document.getElementById('orderDrawer');
            const drawer = bootstrap.Offcanvas.getInstance(drawerElement);
            if(drawer) drawer.hide();

            // Open the thermal print view
            window.open(`/admin_dashboard/orders/print/${num}/`, '_blank', 'width=400,height=600');
            
            // Refresh the grid to move the order to the 'Packed' tab
            fetchOrders(1);
        }
    });
}

function openRiderModal(orderNum) {
    activeOrderNum = orderNum; // 2. SET THE ACTIVE ORDER HERE
    
    // First, close the side drawer so it doesn't overlap
    const drawerElement = document.getElementById('orderDrawer');
    const drawer = bootstrap.Offcanvas.getInstance(drawerElement);
    if(drawer) drawer.hide();

    // Now show the rider modal
    const riderModal = new bootstrap.Modal(document.getElementById('riderModal'));
    riderModal.show();
}
function executeAssignRider() {
    const riderId = document.getElementById('riderSelect').value;
    const orderNum = activeOrderNum; 

    if(!riderId || !orderNum) {
        alert("Please select a rider and ensure an order is selected.");
        return;
    }

    fetch(`/admin_dashboard/orders/update-status/`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({
            'order_number': orderNum,
            'delivery_boy_id': riderId  // FIX: Match this to the data.get() in your view
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success) {
            alert("Order Assigned!");
            // Hide modal and refresh
            bootstrap.Modal.getInstance(document.getElementById('riderModal')).hide();
            fetchOrders(1);
        } else {
            console.error("Server Error:", data.error);
            alert("Assignment failed: " + data.error);
        }
    })
    .catch(err => {
        console.error("Network Error:", err);
    });
}

function rejectOrder(orderNum) {
    const reason = prompt("Please enter the reason for rejection:");
    
    if (reason === null) return; // User cancelled the prompt

    fetch(`/admin_dashboard/orders/reject/`, { // Ensure this URL matches your urls.py
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}' // CRITICAL: Ensure this is present
        },
        body: JSON.stringify({
            'order_number': orderNum,
            'reason': reason
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("Order Rejected Successfully");
            location.reload(); // Or call your fetchOrders() function
        } else {
            alert("Error: " + data.error);
        }
    })
    .catch(err => console.error("Rejection failed:", err));
}

// Logic for pills and search... (same as previous)
document.querySelectorAll('.pill').forEach(btn => {
    btn.onclick = function() {
        document.querySelector('.pill.active').classList.remove('active');
        this.classList.add('active');
        currentStatus = this.dataset.status;
        fetchOrders(1);
    };
});

fetchOrders(1);
</script>
{% endblock %}
