{% extends "admin_dashboard/base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div class="container-fluid py-4" style="background-color: #fcfdfa;">
    <div class="row justify-content-center">
        <div class="col-xl-11">
            
            <div class="d-flex align-items-center mb-4">
                <a href="{% url 'list_delivery_hubs' %}" class="btn btn-light rounded-circle shadow-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <h2 class="fw-900 text-dark mb-0">Create Village Cluster</h2>
                    <p class="text-muted mb-0">Map out a new 7KM delivery zone.</p>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
                        
                        <div class="text-center mb-4">
                            <button type="button" id="fetchLocationBtn" class="btn btn-success btn-lg w-100 py-3 rounded-4 shadow-sm fw-bold">
                                <i class="bi bi-geo-fill me-2"></i> FETCH CURRENT LOCATION
                            </button>
                            <div id="loadingStatus" class="mt-2 small text-success d-none">
                                <div class="spinner-border spinner-border-sm me-1"></div> Pinpointing village...
                            </div>
                        </div>

                        <hr class="my-4 opacity-50">

                        <form method="POST" novalidate>
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="fw-bold small text-muted text-uppercase mb-2">Village Cluster Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-2 border-end-0"><i class="bi bi-house-door"></i></span>
                                    <input type="text" name="name" id="id_name" class="form-control form-control-lg border-2 border-start-0" placeholder="e.g. Kanchikacherla Hub" value="{{ form.name.value|default:'' }}" required>
                                </div>
                                <div class="text-danger small">{{ form.name.errors }}</div>
                            </div>

                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="fw-bold small text-muted text-uppercase mb-2">Latitude</label>
                                    <input type="number" step="any" name="latitude" id="id_latitude" class="form-control bg-light border-2" value="{{ form.latitude.value|default:'' }}" readonly required>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="fw-bold small text-muted text-uppercase mb-2">Longitude</label>
                                    <input type="number" step="any" name="longitude" id="id_longitude" class="form-control bg-light border-2" value="{{ form.longitude.value|default:'' }}" readonly required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="fw-bold small text-muted text-uppercase mb-2">Delivery Range</label>
                                <div class="input-group">
                                    <input type="number" name="max_delivery_radius_km" id="id_max_delivery_radius_km" class="form-control border-2" value="7" required>
                                    <span class="input-group-text bg-white border-2 fw-bold text-success">KM</span>
                                </div>
                                <div class="text-danger small">{{ form.max_delivery_radius_km.errors }}</div>
                            </div>

                            <button type="submit" class="btn btn-dark btn-lg w-100 fw-900 rounded-pill py-3 shadow">
                                SAVE HUB LOCATION
                            </button>
                        </form>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100">
                        <div id="map" style="height: 100%; min-height: 550px;"></div>
                        <div class="position-absolute bottom-0 end-0 m-3 z-index-1000">
                            <div class="bg-white p-2 rounded-3 shadow-sm small border border-success">
                                <i class="bi bi-circle-fill text-success opacity-25"></i> Visualizing 7KM Reach
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Initialize Map (Center of Krishna District area)
    var map = L.map('map').setView([16.5061, 80.6480], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    var marker = L.marker([16.5061, 80.6480], {draggable: true}).addTo(map);
    var circle = L.circle([16.5061, 80.6480], {
        color: '#198754',
        fillColor: '#198754',
        fillOpacity: 0.1,
        radius: 7000 // 7KM
    }).addTo(map);

    function updateForm(lat, lng, name = "") {
        document.getElementById('id_latitude').value = lat.toFixed(6);
        document.getElementById('id_longitude').value = lng.toFixed(6);
        if(name) document.getElementById('id_name').value = name;
        
        // Update Map Visuals
        marker.setLatLng([lat, lng]);
        circle.setLatLng([lat, lng]);
        map.panTo([lat, lng]);
    }

    // 2. The Fetch Logic with Reverse Geocoding
    document.getElementById('fetchLocationBtn').addEventListener('click', function() {
        const btn = this;
        const status = document.getElementById('loadingStatus');
        
        btn.disabled = true;
        status.classList.remove('d-none');

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                // Fetch Village Name from API
                fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                    .then(res => res.json())
                    .then(data => {
                        const vName = data.address.village || data.address.suburb || data.address.town || "New Cluster";
                        updateForm(lat, lng, vName);
                        btn.disabled = false;
                        status.classList.add('d-none');
                    });
            }, () => {
                alert("Please enable location.");
                btn.disabled = false;
                status.classList.add('d-none');
            });
        }
    });

    // 3. Radius Change Listener
    document.getElementById('id_max_delivery_radius_km').addEventListener('input', function() {
        circle.setRadius(this.value * 1000);
    });

    // 4. Manual Map Adjustments
    map.on('click', e => updateForm(e.latlng.lat, e.latlng.lng));
    marker.on('dragend', e => updateForm(marker.getLatLng().lat, marker.getLatLng().lng));

</script>

<style>
    .fw-900 { font-weight: 900; }
    #map { z-index: 1; border-radius: 0 1rem 1rem 0; }
    .input-group-text { border-color: #dee2e6; }
    .z-index-1000 { z-index: 1000; }
    .form-control:focus { border-color: #198754; box-shadow: none; }
</style>
{% endblock %}
