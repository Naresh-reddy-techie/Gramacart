{% extends 'admin_dashboard/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-9 col-lg-8 col-xl-7">
            <div class="card shadow-lg rounded-3 border-0">
                <div class="card-header bg-gradient text-white text-center py-4 rounded-3">
                    <h3 class="fw-bold mb-0">Reject Vendor: {{ vendor.shop_name }}</h3>
                </div>
                <div class="card-body px-4 py-5">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="rejection_reason" class="form-label fw-semibold">Reason for Rejection</label>
                            {{ form.rejection_reason }}  <!-- No need to add class here, it's already in the form definition -->
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-danger rounded-pill px-4 py-2">Reject Vendor</button>
                            <a href="{% url 'vendor_list' %}" class="btn btn-secondary rounded-pill px-4 py-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
