<div class="dashboard-card rider-fleet-card p-4 bg-white border-0 shadow-sm rounded-4">
    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <h6 class="fw-800 text-navy mb-0">Rider Fleet Status</h6>
        <a href="{% url 'delivery_boy_list' %}" class="extra-small fw-700 text-primary text-decoration-none">View Fleet</a>
    </div>
    
    <div class="row g-3">
        <div class="col-6">
            <div class="fleet-box bg-emerald-subtle p-3 rounded-4 text-center border border-emerald-subtle">
                <div class="fleet-icon text-emerald mb-2"><i class="bi bi-bicycle fs-4"></i></div>
                <div class="fleet-value text-emerald fw-900 fs-3 lh-1">{{ active_riders_count|stringformat:"02d" }}</div>
                <div class="fleet-label extra-small fw-700 text-uppercase ls-wide opacity-75">Active Now</div>
            </div>
        </div>
        
        <div class="col-6">
            <div class="fleet-box bg-light p-3 rounded-4 text-center border">
                <div class="fleet-icon text-muted mb-2"><i class="bi bi-person-x fs-4"></i></div>
                <div class="fleet-value text-navy fw-900 fs-3 lh-1">{{ offline_riders_count|stringformat:"02d" }}</div>
                <div class="fleet-label extra-small fw-700 text-uppercase ls-wide opacity-75">Offline</div>
            </div>
        </div>
        
        <div class="col-12 mt-3">
            <div class="d-flex justify-content-between align-items-center p-3 border rounded-4 bg-white hover-shadow transition-all" style="cursor: pointer;">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-circle bg-blue-soft text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                        <i class="bi bi-stopwatch fs-4"></i>
                    </div>
                    <div>
                        <div class="fw-800 text-navy mb-0 fs-5">{{ avg_delivery_time|default:"--" }} Mins</div>
                        <div class="text-muted extra-small fw-700 text-uppercase ls-thin">Avg. Delivery Speed</div>
                    </div>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </div>
        </div>
    </div>
</div>
