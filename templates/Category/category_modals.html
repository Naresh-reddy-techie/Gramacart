<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-5 overflow-hidden">
            <div class="modal-header bg-dark text-white p-4 border-0">
                <h5 class="modal-title fw-900"><i class="bi bi-plus-circle-dotted me-2 text-primary"></i>New Department</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="post"enctype="multipart/form-data" action="{% url 'add_category' %}">
                {% csrf_token %}
                <div class="modal-body p-4 bg-light">
                    <label class="text-muted extra-small fw-800 mb-2 ms-1">DEPARTMENT IDENTITY</label>
                    <input type="text" name="name" class="form-control border-0 p-3 shadow-sm rounded-4" placeholder="e.g. Farm Fresh Dairy" required>
                </div>
                <div class="mt-3">
                    <label class="form-label fw-bold">
                        Category Image
                    </label>

                    <input type="file"
                        name="image"
                        class="form-control"
                        accept="image/*">
                </div>
                <div class="modal-footer p-4 border-0 bg-light">
                    <button type="button" class="btn btn-link text-muted fw-bold text-decoration-none" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary px-5 py-2 rounded-4 fw-bold shadow">Deploy Category</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="editCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-5 overflow-hidden">
            <div class="modal-header p-4 border-0">
                <h5 class="modal-title fw-900 text-dark">Update Department</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post"enctype="multipart/form-data"id="editCategoryForm">
                {% csrf_token %}
                <div class="modal-body p-4">

                    <label class="form-label fw-bold">
                        Category Name
                    </label>

                    <input type="text"
                        name="name"
                        class="form-control border-0 p-3 bg-light rounded-4 fw-bold text-navy"
                        id="editCatName"
                        required>

                    <div class="mt-3">
                        <label class="form-label fw-bold">
                            Category Image
                        </label>

                        <input type="file"
                            name="image"
                            class="form-control"
                            accept="image/*">
                    </div>

                </div>
                <div class="modal-footer p-4 border-0">
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow-lg">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function openEditModal(id, name, url) {
        const modal = new bootstrap.Modal(document.getElementById('editCategoryModal'));
        document.getElementById('editCatName').value = name;
        document.getElementById('editCategoryForm').action = url;
        modal.show();
    }
</script>
