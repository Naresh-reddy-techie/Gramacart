{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate {{ product.name }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f8fafc;
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 0;
}

.card-box {
    max-width: 600px;
    margin: 40px auto;
    background: #fff;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.product-title {
    font-weight: 800;
    font-size: 1.2rem;
    margin-bottom: 20px;
}

.star-container {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    user-select: none;
}

.star {
    font-size: 2.5rem;
    color: #ddd;
    cursor: pointer;
    transition: 0.2s ease;
    -webkit-tap-highlight-color: transparent;
}

.star.active {
    color: #f5c518;
    transform: scale(1.1);
}

textarea {
    border-radius: 12px !important;
    resize: none;
}

.btn-success {
    width: 100%;
    border-radius: 12px;
    padding: 12px;
    font-weight: 800;
}
</style>
</head>

<body>

<div class="card-box">

    <div class="product-title">
        ⭐ Rate "{{ product.name }}"
    </div>

    <form method="post">
        {% csrf_token %}

        <!-- STAR RATING -->
        <label class="fw-bold mb-2">Your Rating</label>

        <div class="star-container" id="starContainer">
            {% for i in "12345" %}
                <span class="star" data-value="{{ forloop.counter }}">★</span>
            {% endfor %}
        </div>

        <!-- hidden Django field -->
        <div style="display:none;">
            {{ form.score }}
        </div>

        <!-- REVIEW -->
        <div class="mb-3 mt-3">
            <label class="fw-bold mb-2">Review (optional)</label>
            {{ form.review }}
        </div>

        <button type="submit" class="btn btn-success">
            {% if user_rating %}Update Review{% else %}Submit Review{% endif %}
        </button>

        <a href="{% url 'product_detail' product.slug %}" class="btn btn-outline-secondary mt-2 w-100">
            Cancel
        </a>
    </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const stars = document.querySelectorAll(".star");
    const input = document.querySelector("input[name='score']");

    if (!input) return;

    function highlight(value) {
        stars.forEach((star, index) => {
            star.classList.toggle("active", index < value);
        });
    }

    // initial value (edit mode safe)
    const initial = parseInt(input.value || "0");
    if (initial > 0) {
        highlight(initial);
    }

    // click handler
    stars.forEach((star, index) => {
        star.addEventListener("click", () => {
            const value = index + 1;
            input.value = value;
            highlight(value);
        });
    });

});
</script>

</body>
</html>
