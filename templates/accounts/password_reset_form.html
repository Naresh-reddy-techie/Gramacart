{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GramaCart | Reset Credentials</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --emerald: #00c853;
            --navy: #0f172a;
            --bg-gray: #f8fafc;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-gray);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            letter-spacing: -0.01em;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.05);
            border: 1px solid rgba(0,0,0,0.02);
            text-align: center;
        }

        /* --- SECURITY ICON --- */
        .security-icon {
            width: 64px; height: 64px;
            background: #f1f5f9;
            color: var(--navy);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 25px;
            border: 1px solid var(--border-color);
        }

        .brand-name {
            font-weight: 800;
            font-size: 24px;
            color: var(--navy);
            letter-spacing: -1.5px;
            margin-bottom: 8px;
        }
        .brand-name span { color: var(--emerald); }

        .instruction-text {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* --- FORM STYLING --- */
        .field-wrap {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            font-weight: 700;
            font-size: 12px;
            color: var(--navy);
            margin-bottom: 8px;
            display: block;
        }

        .field-icon {
            position: absolute;
            left: 18px;
            top: 41px;
            color: #94a3b8;
            font-size: 14px;
        }

        /* Target the Django email input */
        .field-wrap input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: #fcfdfe;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .field-wrap input:focus {
            outline: none;
            border-color: var(--emerald);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 200, 83, 0.08);
        }

        /* --- BUTTON --- */
        .btn-reset {
            background: var(--navy);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-reset:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .back-link {
            margin-top: 25px;
            display: block;
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--emerald);
        }
        .brand-icon {
            width: 56px;
            height: 56px;
            background: transparent; /* remove background if using image */
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.1);
            overflow: hidden;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* keeps proportions */
        }
        
    </style>
</head>

<body>

<div class="auth-container">
    <div class="brand-icon">
            <img src="{% static 'images/logo.png' %}" alt="GramaCart Logo">
     </div>

    <h1 class="brand-name">GRAMA<span>CART</span></h1>
    <p class="instruction-text">
        Forgot your access credentials? Enter your registered email and we'll send a secure recovery link.
    </p>

    <form method="post">
        {% csrf_token %}
        
        <div class="field-wrap">
            <label class="form-label">System Email Address</label>
            <i class="fas fa-envelope field-icon"></i>
            {{ form.email }}
            {% if form.email.errors %}
                <div class="text-danger mt-1 fw-600" style="font-size: 11px;">
                    {{ form.email.errors|striptags }}
                </div>
            {% endif %}
        </div>

        <button type="submit" class="btn-reset">
            Send Recovery Link <i class="fas fa-paper-plane ms-2"></i>
        </button>

        <a href="{% url 'user_signin' %}" class="back-link">
            <i class="fas fa-arrow-left me-1"></i> Back to System Sign In
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
